name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Buildozer dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq python3-pip git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev cmake libffi-dev libssl-dev libltdl-dev 2>&1 | tail -3
          pip install --user --upgrade Cython==0.29.36 virtualenv buildozer 2>&1 | tail -5
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build APK
        run: |
          rm -rf .buildozer
          yes | buildozer android debug 2>&1

      - uses: actions/upload-artifact@v4
        with:
          name: control-obra-apk
          path: bin/*.apk
