name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Kivy Docker
        run: |
          docker run --rm \
            -v $PWD:/app \
            -e BUILDOZER_ALLOW_ROOT=1 \
            kivy/buildozer:latest \
            bash -c "cd /app && rm -rf .buildozer && yes | buildozer android debug 2>&1"

      - uses: actions/upload-artifact@v4
        with:
          name: control-obra-apk
          path: bin/*.apk
